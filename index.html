                ctx.fillRect(bx, by, bw * Math.max(0, entity.hp / entity.maxHp), bh);

            } else if (entity.mtype === 'golem') {
                // ---- 銅ゴーレム：四角くゴツい ----
                const s = 5.5;
                // 影
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(cx - s*0.9, cy + s*0.7, s*1.8, s*0.4);

                // 本体（角丸四角）
                const grd = ctx.createLinearGradient(cx - s, cy - s, cx + s, cy + s);
                grd.addColorStop(0, '#e59866');
                grd.addColorStop(0.4, '#ca6f1e');
                grd.addColorStop(1, '#7e5109');
                ctx.beginPath();
                ctx.roundRect(cx - s, cy - s, s*2, s*2, 2);
                ctx.fillStyle = grd; ctx.fill();
                ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 1; ctx.stroke();

                // 銅の継ぎ目ライン
                ctx.strokeStyle = 'rgba(80,40,0,0.5)'; ctx.lineWidth = 0.8;
                ctx.beginPath(); ctx.moveTo(cx - s, cy); ctx.lineTo(cx + s, cy); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, cy - s); ctx.lineTo(cx, cy + s); ctx.stroke();

                // ボルト（四隅）
                ctx.fillStyle = '#f39c12';
                [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([dx,dy]) => {
                    ctx.beginPath(); ctx.arc(cx + dx*(s-1.5), cy + dy*(s-1.5), 1, 0, Math.PI*2); ctx.fill();
                });

                // 目（黄色く光る）
                ctx.fillStyle = '#f1c40f';
                ctx.shadowColor = '#f1c40f'; ctx.shadowBlur = 4;
                ctx.beginPath(); ctx.arc(cx - 1.8, cy - 1, 1.2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 1.8, cy - 1, 1.2, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;

                const bw = 12, bh = 2;
                const bx = cx - bw/2, by = cy - s - 6;
                ctx.fillStyle = '#1a1a1a'; ctx.fillRect(bx-0.5, by-0.5, bw+1, bh+1);
                ctx.fillStyle = '#922b21'; ctx.fillRect(bx, by, bw, bh);
                ctx.fillStyle = '#27ae60';
                ctx.fillRect(bx, by, bw * Math.max(0, entity.hp / entity.maxHp), bh);
            }

            ctx.restore();

            // ちびの成長バー
            if (entity.isBaby) {
                const progress = Math.min(1, (Date.now() - entity.bornAt) / 20000);
                const bw = 12, bh = 2, bx = cx - bw/2, by = cy + 8;
                ctx.fillStyle = '#333'; ctx.fillRect(bx-0.5, by-0.5, bw+1, bh+1);
                ctx.fillStyle = '#e91e96'; ctx.fillRect(bx, by, bw * progress, bh);
            }
        }

        monsters.forEach(drawEntity);
        heroes.forEach(drawEntity);

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.life -= 0.04; 
            if (p.life <= 0) {
                particles.splice(i, 1);
            } else {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.globalAlpha = 1.0;
            }
        }

        // フローティングテキスト描画
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            let ft = floatingTexts[i];
            ft.y += ft.vy;
            ft.life -= 0.022;
            if (ft.life <= 0) {
                floatingTexts.splice(i, 1);
            } else {
                ctx.save();
                ctx.globalAlpha = ft.life;
                ctx.font = 'bold 13px "Courier New", monospace';
                ctx.fillStyle = ft.color;
                ctx.strokeStyle = 'rgba(0,0,0,0.7)';
                ctx.lineWidth = 3;
                ctx.textAlign = 'center';
                ctx.strokeText(ft.text, ft.x, ft.y);
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.restore();
            }
        }

        requestAnimationFrame(gameLoop);
    }
</script>
<div id="levelPanelBackdrop" onclick="toggleLevelPanel()"></div>
<button id="levelPanelFAB" onclick="toggleLevelPanel()">⚗</button>
</body>
</html>
